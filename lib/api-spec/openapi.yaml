openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Personal Finance Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: transactions
    description: Transaction management
  - name: categories
    description: Category management
  - name: analytics
    description: Analytics and summaries
  - name: assets
    description: Asset tracking
  - name: import
    description: Data import operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /transactions:
    get:
      operationId: getTransactions
      tags: [transactions]
      summary: List transactions
      parameters:
        - name: month
          in: query
          schema:
            type: ["string", "null"]
          description: Filter by month (YYYY-MM)
        - name: categoryId
          in: query
          schema:
            type: ["integer", "null"]
        - name: type
          in: query
          schema:
            type: ["string", "null"]
            enum: [income, expense, transfer, null]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"
    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Create a transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionInput"
      responses:
        "201":
          description: Created transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/{id}:
    get:
      operationId: getTransaction
      tags: [transactions]
      summary: Get a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateTransaction
      tags: [transactions]
      summary: Update a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTransactionInput"
      responses:
        "200":
          description: Updated transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTransaction
      tags: [transactions]
      summary: Delete a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories:
    get:
      operationId: getCategories
      tags: [categories]
      summary: List categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryInput"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryInput"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /analytics/monthly-summary:
    get:
      operationId: getMonthlySummary
      tags: [analytics]
      summary: Get monthly summary
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
          description: Month in YYYY-MM format
      responses:
        "200":
          description: Monthly summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlySummary"

  /analytics/spending-by-category:
    get:
      operationId: getSpendingByCategory
      tags: [analytics]
      summary: Get spending breakdown by category
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Spending by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategorySpending"

  /analytics/monthly-trend:
    get:
      operationId: getMonthlyTrend
      tags: [analytics]
      summary: Get monthly income/expense trend
      parameters:
        - name: months
          in: query
          schema:
            type: ["integer", "null"]
          description: Number of months to include (default 12)
      responses:
        "200":
          description: Monthly trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyTrendPoint"

  /assets:
    get:
      operationId: getAssets
      tags: [assets]
      summary: List assets
      responses:
        "200":
          description: List of assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Asset"
    post:
      operationId: createAsset
      tags: [assets]
      summary: Create an asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetInput"
      responses:
        "201":
          description: Created asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"

  /assets/{id}:
    patch:
      operationId: updateAsset
      tags: [assets]
      summary: Update an asset value
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAssetInput"
      responses:
        "200":
          description: Updated asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
    delete:
      operationId: deleteAsset
      tags: [assets]
      summary: Delete an asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /assets/net-worth-history:
    get:
      operationId: getNetWorthHistory
      tags: [assets]
      summary: Get net worth history
      responses:
        "200":
          description: Net worth over time
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NetWorthPoint"

  /import/parse:
    post:
      operationId: parseImport
      tags: [import]
      summary: Parse bank statement text
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParseImportInput"
      responses:
        "200":
          description: Parsed transactions preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParseImportResult"
        "400":
          description: Parse error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /import/confirm:
    post:
      operationId: confirmImport
      tags: [import]
      summary: Confirm and save parsed transactions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmImportInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfirmImportResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Transaction:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
          format: date
        description:
          type: string
        amount:
          type: number
        type:
          type: string
          enum: [income, expense, transfer]
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        categoryColor:
          type: ["string", "null"]
        categoryIcon:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - date
        - description
        - amount
        - type
        - tags
        - createdAt

    TransactionListResponse:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        total:
          type: integer
        totalIncome:
          type: number
        totalExpenses:
          type: number
      required:
        - transactions
        - total
        - totalIncome
        - totalExpenses

    CreateTransactionInput:
      type: object
      properties:
        date:
          type: string
          format: date
        description:
          type: string
        amount:
          type: number
        type:
          type: string
          enum: [income, expense, transfer]
        categoryId:
          type: ["integer", "null"]
        tags:
          type: array
          items:
            type: string
        notes:
          type: ["string", "null"]
      required:
        - date
        - description
        - amount
        - type

    UpdateTransactionInput:
      type: object
      properties:
        date:
          type: string
          format: date
        description:
          type: string
        amount:
          type: number
        type:
          type: string
          enum: [income, expense, transfer]
        categoryId:
          type: ["integer", "null"]
        tags:
          type: array
          items:
            type: string
        notes:
          type: ["string", "null"]

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        icon:
          type: string
        color:
          type: string
        parentId:
          type: ["integer", "null"]
        parentName:
          type: ["string", "null"]
        transactionCount:
          type: integer
      required:
        - id
        - name
        - icon
        - color
        - transactionCount

    CreateCategoryInput:
      type: object
      properties:
        name:
          type: string
        icon:
          type: string
        color:
          type: string
        parentId:
          type: ["integer", "null"]
      required:
        - name
        - icon
        - color

    UpdateCategoryInput:
      type: object
      properties:
        name:
          type: string
        icon:
          type: string
        color:
          type: string
        parentId:
          type: ["integer", "null"]

    MonthlySummary:
      type: object
      properties:
        month:
          type: string
        totalIncome:
          type: number
        totalExpenses:
          type: number
        netSavings:
          type: number
        savingsRate:
          type: number
        transactionCount:
          type: integer
        topCategories:
          type: array
          items:
            $ref: "#/components/schemas/CategorySpending"
      required:
        - month
        - totalIncome
        - totalExpenses
        - netSavings
        - savingsRate
        - transactionCount
        - topCategories

    CategorySpending:
      type: object
      properties:
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: string
        categoryColor:
          type: string
        categoryIcon:
          type: string
        amount:
          type: number
        percentage:
          type: number
        transactionCount:
          type: integer
      required:
        - categoryName
        - categoryColor
        - categoryIcon
        - amount
        - percentage
        - transactionCount

    MonthlyTrendPoint:
      type: object
      properties:
        month:
          type: string
        income:
          type: number
        expenses:
          type: number
        savings:
          type: number
      required:
        - month
        - income
        - expenses
        - savings

    Asset:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [cash, investment, property, crypto, other]
        currentValue:
          type: number
        currency:
          type: string
        color:
          type: string
        icon:
          type: string
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - type
        - currentValue
        - currency
        - color
        - icon
        - updatedAt

    CreateAssetInput:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [cash, investment, property, crypto, other]
        currentValue:
          type: number
        currency:
          type: string
        color:
          type: string
        icon:
          type: string
      required:
        - name
        - type
        - currentValue
        - currency
        - color
        - icon

    UpdateAssetInput:
      type: object
      properties:
        name:
          type: string
        currentValue:
          type: number
        color:
          type: string
        icon:
          type: string

    NetWorthPoint:
      type: object
      properties:
        date:
          type: string
          format: date
        netWorth:
          type: number
        breakdown:
          type: object
          additionalProperties:
            type: number
      required:
        - date
        - netWorth
        - breakdown

    ParseImportInput:
      type: object
      properties:
        content:
          type: string
          description: Raw text content of the bank statement (CSV or plain text)
        format:
          type: string
          enum: [csv, text, auto]
      required:
        - content
        - format

    ParsedTransaction:
      type: object
      properties:
        date:
          type: string
          format: date
        description:
          type: string
        amount:
          type: number
        type:
          type: string
          enum: [income, expense, transfer]
        suggestedCategoryId:
          type: ["integer", "null"]
        suggestedCategoryName:
          type: ["string", "null"]
      required:
        - date
        - description
        - amount
        - type

    ParseImportResult:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/ParsedTransaction"
        totalFound:
          type: integer
        parseErrors:
          type: array
          items:
            type: string
      required:
        - transactions
        - totalFound
        - parseErrors

    ConfirmImportInput:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/CreateTransactionInput"
      required:
        - transactions

    ConfirmImportResult:
      type: object
      properties:
        imported:
          type: integer
        failed:
          type: integer
      required:
        - imported
        - failed
